name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift tests
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Run tests
        run: swift test

  lint-scripts:
    name: Shell script syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Check shell scripts
        run: bash -n scripts/build-app.sh scripts/release.sh
